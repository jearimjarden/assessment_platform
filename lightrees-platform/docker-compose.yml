services:
  postgres:
    image: postgres:16
    # Use a single, clear container name to avoid duplicate containers
    container_name: lightrees-postgres

    environment:
      POSTGRES_USER: lightrees
      POSTGRES_PASSWORD: lightrees
      POSTGRES_DB: lightrees

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: